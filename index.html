  setupFade() {
    const root = this.root;
    if (!root) return;
    const anim = this.props.entranceAnimations !== false;
    if (!anim) {
      root.querySelectorAll('[data-fade]').forEach((el) => {
        el.style.opacity = '1';

      });
    }
  }

  revealFades() {
    const root = this.root;
    if (!root) return;
    if (this.props.entranceAnimations === false) return;
    const vh = window.innerHeight;
    root.querySelectorAll('[data-fade]').forEach((el) => {
      if (el.dataset.revealed) return;
      const rect = el.getBoundingClientRect();
      if (rect.top < vh + 60 && rect.bottom > -60) {
        el.dataset.revealed = '1';
        el.style.opacity = '1';
        el.style.transform = 'none';
        // Self-heal: some renderers freeze CSS transitions on composited
        // layers. After the animation window, snap to the final state with
        // the transition disabled so content is always visible.
        setTimeout(function () {
          el.style.transition = 'none';
          el.style.opacity = '1';
          el.style.transform = 'none';
        }, 1500);
      }
    });
  }

  setupMarqueeFit() {
    const root = this.root;
    if (!root) return;
    // Uploaded posters (*) should show in full, not cropped:
    // widen the tile to match the poster's aspect ratio at the row height.
    root.querySelectorAll('[data-row] img').forEach(function (img) {
      const src = img.getAttribute('src') || '';
      if (src.indexOf('http') === 0) return;
      const apply = function () {
        if (img.naturalWidth && img.naturalHeight) {
          img.style.width = Math.round(270 * (img.naturalWidth / img.naturalHeight)) + 'px';
        }
      };
      if (img.complete) apply();
      else img.addEventListener('load', apply, { once: true });
    });
  }

  setupCards() {
    const root = this.root;
    if (!root) return;
    const off = this.props.entranceAnimations === false;
    const peek = 16;
    const vh = window.innerHeight;
    root.querySelectorAll('[data-card-container]').forEach((c, i) => {
      const inner = c.querySelector('[data-card-inner]');
      const basePin = 24 + i * peek;
      const h = inner ? inner.offsetHeight : 0;
      // Cards that fit the screen pin into the top pile. Cards taller than the
      // screen scroll fully through (readable) before pinning bottom-aligned,
      // so their lower content is never hidden by an early pin.
      const top = h > (vh - basePin - 24) ? Math.round(vh - h - 24) : basePin;
      c.style.top = top + 'px';
      c.style.zIndex = String(i + 1);
      if (inner && off) {
        inner.style.transform = 'none';
        inner.style.opacity = '1';
      }
    });
  }

  onMouse(e) {
    const root = this.root;
    if (!root) return;
    const m = root.querySelector('[data-magnet]');
    if (!m) return;
    const strength = this.props.magnetStrength || 3;
    const pad = 150;
    const r = m.getBoundingClientRect();
    if (!r.width) return;
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const within = e.clientX > r.left - pad && e.clientX < r.right + pad && e.clientY > r.top - pad && e.clientY < r.bottom + pad;
    if (within) {
      m.style.transition = 'transform 0.3s ease-out';
      m.style.transform = 'translate3d(' + (dx / strength) + 'px,' + (dy / strength) + 'px,0)';
    } else {
      m.style.transition = 'transform 0.6s ease-in-out';
      m.style.transform = 'translate3d(0,0,0)';
    }
  }

  onScroll() {
    if (this._ticking) return;
    this._ticking = true;

  _update() {
    const root = this.root;
    if (!root) return;
    const vh = window.innerHeight;

    this.revealFades();

    // Accumulating card deck: each card pins near the top; as the next card
    // rises to cover it, the pinned card recedes (shrinks + dims), so the pile
    // deepens the further you scroll ("逐渐叠上去").
    if (this.props.entranceAnimations !== false) {
      const containers = root.querySelectorAll('[data-card-container]');
      containers.forEach((c, i) => {
        const inner = c.querySelector('[data-card-inner]');
        if (!inner) return;
        const next = containers[i + 1];
        if (!next) { inner.style.transform = 'none'; inner.style.opacity = '1'; return; }
        const nextTop = next.getBoundingClientRect().top;
        let p = (vh - nextTop) / vh;   // 0 before next covers, 1 when next reaches top
        p = Math.max(0, Math.min(1, p));
        inner.style.transform = 'scale(' + (1 - 0.06 * p).toFixed(4) + ')';
        inner.style.opacity = (1 - 0.4 * p).toFixed(3);
      });
    }

    // Marquee
    const sec = root.querySelector('[data-marquee]');
    if (sec) {
      const rect = sec.getBoundingClientRect();
      const speed = this.props.marqueeSpeed || 0.3;
      const offset = (vh - rect.top) * speed;
      const r1 = root.querySelector('[data-row="1"]');
      const r2 = root.querySelector('[data-row="2"]');
      if (r1) r1.style.transform = 'translateX(' + (offset - 200) + 'px)';
      if (r2) r2.style.transform = 'translateX(' + (-(offset - 200)) + 'px)';
    }

    // Animated text
    const at = root.querySelector('[data-animtext]');
    if (at) {
      const rect = at.getBoundingClientRect();
      const total = 0.6 * vh + rect.height;
      let p = (0.8 * vh - rect.top) / total;
      p = Math.max(0, Math.min(1, p));
      const spans = at.querySelectorAll('[data-char]');
      const cf = p * spans.length;
      spans.forEach((s, i) => {
        const local = Math.max(0, Math.min(1, cf - i));
        s.style.opacity = (0.2 + 0.8 * local).toFixed(3);
      });
    }
  }

        stats: [{ value: '20M+', label: 'Registered Users' }, { value: '100min+', label: 'Daily Time' }, { value: '65%+', label: 'Retention' }],
        desc: "A generative-AI virtual-character platform: 20M+ registered users, 100+ minutes of daily use, 65%+ retention. My job here was to answer its hardest question — where the money in AIGC comes from. The AI-video line I ran later became the direct basis for launching CastLoop.\n\nRetention was never this product's weak spot — monetization was. Subscriptions cap out low, and interruptive ads hurt immersion, which is this genre's lifeblood. Our answer was “generation as consumption” — making the act of AI generation itself the paid moment, where content is the product. I owned three parts of this line:\n\nInteractive paid-feature matrix — I planned and drove features like Inner Monologue (peeking into a character's private thoughts), AI-image tips, and AI video. The underlying bet: at moments of peak emotional intensity, users will pay to get “closer to the character.” Image-tipping turned the one-way gift of traditional tipping into “I spend gems, and AI generates a scene made just for me with this character” — after launch, tipping UV rose to 1,700+ and single-day gem spend broke 100k.\n\nAI video: the platform's next step grew out of this line — text and images have an emotional ceiling, and users want to see the character truly “move.” I connected the full pipeline from production to consumption; peak daily gem spend broke 330k, becoming the platform's first growth curve. But the real value wasn't the revenue — it proved users would keep paying for AI-generated video, and that proof became the company's direct basis for betting on AI interactive film-games and launching CastLoop. Proving out video consumption first is what made everything after it possible.\n\nAds × content — no hard ad slots; ads are embedded into story mechanics, e.g. a “locked door” beat mid-conversation where watching an ad continues the story. Ad revenue rose ~38% with no retention loss.\n\nModel side — I helped land our in-house LLM, running blind dialogue tests and fine-tuning of mainstream vs. in-house models with the algorithm team, focused on coherence, emotional stability, and character consistency; and built a reply-quality evaluation system, feeding user behavior data back into training.\n\nThis project clarified the dividing line of an AI product PM for me: the ceiling of the experience is set by the model, so a PM must be able to define “what a good reply is” and turn it into an evaluable, iterable metric system."
      },
      '02': {
        name: 'CastLoop', cat: 'XVERSE · Platform Product 0-to-1 · 2026.1–2026.3',
        tags: ['AI Film-Game', 'Two-sided Platform', 'Content Supply', '0 to 1'],
        stats: [{ value: '100+', label: 'Original Works' }, { value: '70%+', label: 'Cost Cut' }, { value: 'Dual', label: 'Consume + Create' }],
        desc: "An AI interactive film-game platform — a two-sided product with a consumer app and a creator studio (CastLoop Studio). I owned the platform's 0-to-1 product definition: the first spec came from me, and I left after the first version shipped; the platform later launched officially with 100+ original interactive works.\n\nCastLoop wasn't conceived out of thin air — its basis came from Saylo's AI video. That line grew into the first growth curve, proving users would keep paying for AI-generated video, so turning video from something you “watch” into an “interactive work” was the natural next step. But a single work can't sustain a content category — users burn through a batch of stories and hit a drought, and a handful of pro teams making things by hand can never keep pace. CastLoop's question was platform-level: how to turn interactive film-games from “projects” into “a content type that can be produced at scale, continuously.”\n\nOn the consumer side, I defined the full “watch-to-play” experience: users enter a story like a short drama, make choices at key nodes or freely type ideas, and AI generates new scenes and directions in real time; monetization follows content-platform logic — the full story opens for free, while premium options and chapters cost gems. Underneath is a standardized tree-shaped plot framework: branches open locally, the main line converges at key nodes, and AI fills content between nodes with logic validation — so “everyone's story is different” and “production cost stays controllable” hold at once. This framework absorbed the lessons the content team paid for on The Glass Lake (an interactive horror work launched on Saylo in 2026.3): early versions had branch explosions, ran over an hour, and couldn't be produced sustainably. My job was to productize those content-side lessons into standard platform capabilities.\n\nThe creator side, CastLoop Studio, is the platform's real ambition: from a one-line idea, a creator generates a complete project — script, characters, scenes, storyboards, plot tree, all the way to video; AI gives an editable first version and the human judges direction, tunes pacing, and converges it. The core proposition is redefining the creator's role: from “writing out every possibility” to “creative director.” This side directly determines whether platform supply can scale — and whether the next hit comes from an ordinary person with nothing but a story idea.\n\nAt the end of March 2026, I left after the first version shipped. The platform then launched publicly with 100+ original works; per official figures, the full AI creation system cut combined production-and-iteration cost by 70%+.\n\nThis project and Hugging are two eras of the same judgment: a platform's decisive battle is always on the supply side. In the Hugging era I solved the shortage of real human talent with guilds and a screening system; CastLoop solves content supply with an AI production pipeline — thickening the scale-supply end is a platform's true moat."
      },
      '03': {
        name: 'Vibing', cat: 'XVERSE · 0-to-1 Lead · 2024.7–2026.3',
        tags: ['AI Social', 'Agent Voice Room', '0 to 1'],
        stats: [{ value: '3 months', label: '0-to-1 Launch' }, { value: '+20%', label: 'Ice-break Conv.' }, { value: '35%', label: 'Room Retention' }],
        desc: "An AI-native social product for overseas Gen Z, built on the idea that “you're offline, but your social life isn't” — turning AI from a feature inside a social product into an active participant in social behavior itself.\n\nTraditional social products have two old knots: the moment a user goes offline, relationships start to cool; and a voice room goes cold without its host. Vibing's founding bet was that AI should maintain relationships for the user and keep the room warm.\n\nIn three months, 0-to-1 delivery of 6 core modules — signup, matching, AI avatar, voice rooms, community — on a decoupled architecture built for fast iteration. I led three core mechanisms:\n\nAI Avatar — a combination of persona cloning, autonomous interaction, and voice-room interaction; a user's digital avatar responds, interacts, and maintains social presence while they're offline. The hardest part wasn't the cloning tech, but designing the “substitution boundary”: whether users will own what their avatar says directly determines the sense of attachment.\n\nDynamic matching + AI-guided interaction — new users' biggest drop-off is “matched, but don't know what to talk about”; using AI for ice-breaking and topic guidance raised new users' initial interaction conversion by 20%.\n\nAgent voice rooms — AI takes on warm-up, filling silences, and pacing, turning voice rooms from “host-dependent” into “AI-baseline + human-upside,” lifting next-day room retention to 35% with a 95%+ response rate.\n\nBeyond product, I aligned algorithm, design, and engineering to connect the full pipeline from AI voice-persona modeling to delivery, and built an analytics system around signup, retention, interaction, and paid conversion. The standard I took away: an AI-native product isn't AI bolted onto old interactions — it re-answers “in this scenario, who is serving whom.”"

      '04': {

        desc: "Bixin's global game-companion platform, covering North America, Japan, Europe, and Southeast Asia — turning a companion model already proven at home into a genuinely global business.\n\nIt sounds like a clone; it was really a rebuild. The hardest part of going global isn't translation — it's automatic multi-region partitioning under one product framework: Brazilian users want Free Fire, North American users want COD, and supply structure, gifting, moderation standards, and payment rails are all configured per market.\n\nThe first half was 0-to-1: leading core features — companion booking, voice rooms, IM, community, talent application and review — plus a multi-dimensional ops backend (categories, gifts, moderation, user management, payment) and a data backend (breaking down retention, payment, activity, and uninstall rate by channel and country). Ops weighted dynamically by market: Brazil raised Free Fire's weight to 40%, and a COD challenge drove 65% order growth.\n\nThe second half was a grind through a downturn, with weak user spending and a global supply shortage hitting at once. On supply, I built a “country–game–tier” filtering system, signed 5,000+ mid-tier KOLs, connected Discord with the platform account system, partnered with top North American guilds, and brought in 30k+ quality NA talents (100k+ total supply, 2,000+ newly active monthly). On conversion, I rebuilt the “talent score” incentive and recommendation logic with popularity and feedback factors — 92% recommendation hit rate, 88%+ pick rate; launched a smart order-taking assistant (first-order conversion +55%); and integrated PayPal for cross-border payout with a “N more orders” mechanic to drive repeat purchase.\n\nThree-year results: order conversion from 3% to 10%, ARPU from $25 to $50, service rating 4.8/5, retention +25%, the team turning ROI positive during the downturn, with multiple top performance ratings. This project was my full training in platform thinking: however good         desc: "Qutoutiao's overseas reward-based casual gaming platform: 18M cumulative users, $75M revenue, the company's only profitable overseas innovation team — and my first 0-to-1.\n\nThe business model of reward apps is a tightrope: users come for rewards, the platform monetizes via ads, and acquisition cost, coin payouts, withdrawal policy, and ad revenue — four variables — must all balance at once; any imbalance is a bottomless pit. That's exactly what makes it the best training ground for data-driven methodology.\n\nI single-handedly designed the full system — login, coins, payment, withdrawal, tasks — building a complete light-monetization loop. Two years of high-frequency iteration followed: users grew from 100k to a million in 6 months, backed by 10 core version optimizations; a Southeast Asia “$10 in 7 days” campaign acquired 50k users in one run; a recall system with value tiering + push incentives recalled 4,500+ cumulatively; ads embedded into mini-game flows, rewarded video, and contextual splash screens drove $12k average daily ad revenue; ASO added +10% organic conversion.\n\nIn the end: 35+ sessions and 28 minutes per user per day, a steady 4.6 on Google Play with 285k cumulative reviews. This experience gave me my most fundamental product muscle — a full-loop awareness of growth, monetization, and retention, and the habit that “every decision must survive a data check.” Later, doing AI products, the variables changed but the muscle didn't expire."

    +   '<img data-fade src="deco-cursor.png" data-fallback="https://shrug-person-78902957.figma.site/_components/v2/ebb2b8f25d8e24d5f0a5ca8af4c950de81aa2fd7/Group_134-1.2e04f3ce.png" alt="" style="opacity:0; transform:translate3d(80px,0,0); transition:opacity 0.9s cubic-bezier(0.25,0.1,0.25,1) 0.3s, transform 0.9s cubic-bezier(0.25,0.1,0.25,1) 0.3s; position:absolute; bottom:8%; right:10%; width:clamp(130px,16vw,220px); z-index:1;">'
    +   '<div style="position:relative; z-index:5; display:flex; flex-direction:column; align-items:center; gap:clamp(40px,6vw,64px);">'

    +     '<p data-animtext style="margin:0; color:#D7E2EA; font-weight:500; text-align:center; line-height:1.7; max-width:760px; font-size:clamp(0.95rem,1.6vw,1.2rem); white-space:pre-wrap;">' + charSpans + '</p>'
    +     '<p data-fade style="opacity:0; transform:translate3d(0,20px,0); transition:opacity 0.7s cubic-bezier(0.25,0.1,0.25,1) 0.2s, transform 0.7s cubic-bezier(0.25,0.1,0.25,1) 0.2s; margin:0; color:rgba(215,226,234,0.55); font-weight:300; text-align:center; line-height:1.7; max-width:620px; font-size:clamp(0.82rem,1.1vw,0.98rem);">' + esc(t.aboutSummary) + '</p>'

  render(initial) {
    const v = this.renderVals();
    this.root.innerHTML = this.template(v);
    this.root.querySelectorAll('img[data-fallback]').forEach((im) => im.addEventListener('error', () => { im.src = im.dataset.fallback; }, { once: true }));
    this.root.querySelectorAll('[data-onclick="contact"]').forEach((b) => b.addEventListener('click', () => this.handleContact()));
    this.root.querySelectorAll('[data-onclick="toggle"]').forEach((b) => b.addEventListener('click', () => this.toggleLang()));
    this.setupFade();
    if (!initial) {
      // On language toggle, keep content visible (no re-run of the entrance animation).
      this.root.querySelectorAll('[data-fade]').forEach((el) => {
        el.dataset.revealed = '1';
        el.style.transition = 'none';
        el.style.opacity = '1';
        el.style.transform = 'none';
      });
    }
    this.setupCards();
    this.setupMarqueeFit();
    this._update();
  }

  mount() {
    this.onScroll = this.onScroll.bind(this);
    this.onMouse = this.onMouse.bind(this);
    this.onResize = () => { this.setupCards(); this.onScroll(); };
    this.render(true);
    window.addEventListener('scroll', this.onScroll, { passive: true });
    window.addEventListener('resize', this.onResize);
    window.addEventListener('mousemove', this.onMouse);
    requestAnimationFrame(() => this.onScroll());
    [120, 400, 900].forEach((ms) => setTimeout(() => { this.setupCards(); this.onScroll(); }, ms));
  }
}
new App().mount();
</script>
