class App {

  setRoot = (el) => { if (el) this.root = el; };
  state = { lang: 'zh', emailShown: false };
  toggleLang = () => this.setState((s) => ({ lang: s.lang === 'zh' ? 'en' : 'zh' }));
  handleContact = () => {
    if (!this.state.emailShown) this.setState({ emailShown: true });

  componentDidMount() {
    this.onScroll = this.onScroll.bind(this);
    this.onMouse = this.onMouse.bind(this);
    this.onResize = () => { this.setupCards(); this.onScroll(); };
    this.setupFade();
    this.setupCards();
    this.setupMarqueeFit();
    window.addEventListener('scroll', this.onScroll, { passive: true });
    window.addEventListener('resize', this.onResize);
    window.addEventListener('mousemove', this.onMouse);
    requestAnimationFrame(() => this.onScroll());
    // settle passes so pin offsets reflect final image/font layout
    [120, 400, 900].forEach((t) => setTimeout(() => { this.setupCards(); this.onScroll(); }, t));
  }

  componentWillUnmount() {
    window.removeEventListener('scroll', this.onScroll);
    window.removeEventListener('resize', this.onResize);
    window.removeEventListener('mousemove', this.onMouse);
  }

  setupFade() {
    const root = this.root;
    if (!root) return;
    const anim = this.props.entranceAnimations !== false;
    if (!anim) {
      root.querySelectorAll('[data-fade]').forEach((el) => {
        el.style.opacity = '1';
        el.style.transform = 'none';
      });
    }
  }

  revealFades() {
    const root = this.root;
    if (!root) return;
    if (this.props.entranceAnimations === false) return;
    const vh = window.innerHeight;
    root.querySelectorAll('[data-fade]').forEach((el) => {
      if (el.dataset.revealed) return;
      const rect = el.getBoundingClientRect();
      if (rect.top < vh + 60 && rect.bottom > -60) {
        el.dataset.revealed = '1';
        el.style.opacity = '1';
        el.style.transform = 'none';
        // Self-heal: some renderers freeze CSS transitions on composited
        // layers. After the animation window, snap to the final state with
        // the transition disabled so content is always visible.
        setTimeout(function () {
          el.style.transition = 'none';
          el.style.opacity = '1';
          el.style.transform = 'none';
        }, 1500);
      }
    });
  }

  setupMarqueeFit() {
    const root = this.root;
    if (!root) return;
    // Uploaded posters (*) should show in full, not cropped:
    // widen the tile to match the poster's aspect ratio at the row height.
    root.querySelectorAll('[data-row] img').forEach(function (img) {
      const src = img.getAttribute('src') || '';
      if (src.indexOf('http') === 0) return;
      const apply = function () {
        if (img.naturalWidth && img.naturalHeight) {
          img.style.width = Math.round(270 * (img.naturalWidth / img.naturalHeight)) + 'px';
        }
      };
      if (img.complete) apply();
      else img.addEventListener('load', apply, { once: true });
    });
  }

  setupCards() {
    const root = this.root;
    if (!root) return;
    const off = this.props.entranceAnimations === false;
    const peek = 16;
    const vh = window.innerHeight;
    root.querySelectorAll('[data-card-container]').forEach((c, i) => {
      const inner = c.querySelector('[data-card-inner]');
      const basePin = 24 + i * peek;
      const h = inner ? inner.offsetHeight : 0;
      // Cards that fit the screen pin into the top pile. Cards taller than the
      // screen scroll fully through (readable) before pinning bottom-aligned,
      // so their lower content is never hidden by an early pin.
      const top = h > (vh - basePin - 24) ? Math.round(vh - h - 24) : basePin;
      c.style.top = top + 'px';
      c.style.zIndex = String(i + 1);
      if (inner && off) {
        inner.style.transform = 'none';
        inner.style.opacity = '1';
      }
    });
  }

  onMouse(e) {
    const root = this.root;
    if (!root) return;
    const m = root.querySelector('[data-magnet]');
    if (!m) return;
    const strength = this.props.magnetStrength || 3;
    const pad = 150;
    const r = m.getBoundingClientRect();
    if (!r.width) return;
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const within = e.clientX > r.left - pad && e.clientX < r.right + pad && e.clientY > r.top - pad && e.clientY < r.bottom + pad;
    if (within) {
      m.style.transition = 'transform 0.3s ease-out';
      m.style.transform = 'translate3d(' + (dx / strength) + 'px,' + (dy / strength) + 'px,0)';
    } else {
      m.style.transition = 'transform 0.6s ease-in-out';
      m.style.transform = 'translate3d(0,0,0)';
    }
  }

  onScroll() {
    if (this._ticking) return;
    this._ticking = true;
    requestAnimationFrame(() => { this._ticking = false; this._update(); });
  }

  _update() {
    const root = this.root;
    if (!root) return;
    const vh = window.innerHeight;

    this.revealFades();

    // Accumulating card deck: each card pins near the top; as the next card
    // rises to cover it, the pinned card recedes (shrinks + dims), so the pile
    // deepens the further you scroll ("逐渐叠上去").
    if (this.props.entranceAnimations !== false) {
      const containers = root.querySelectorAll('[data-card-container]');
      containers.forEach((c, i) => {
        const inner = c.querySelector('[data-card-inner]');
        if (!inner) return;
        const next = containers[i + 1];
        if (!next) { inner.style.transform = 'none'; inner.style.opacity = '1'; return; }
        const nextTop = next.getBoundingClientRect().top;
        let p = (vh - nextTop) / vh;   // 0 before next covers, 1 when next reaches top
        p = Math.max(0, Math.min(1, p));
        inner.style.transform = 'scale(' + (1 - 0.06 * p).toFixed(4) + ')';
        inner.style.opacity = (1 - 0.4 * p).toFixed(3);
      });
    }

    // Marquee
    const sec = root.querySelector('[data-marquee]');
    if (sec) {
      const rect = sec.getBoundingClientRect();
      const speed = this.props.marqueeSpeed || 0.3;
      const offset = (vh - rect.top) * speed;
      const r1 = root.querySelector('[data-row="1"]');
      const r2 = root.querySelector('[data-row="2"]');
      if (r1) r1.style.transform = 'translateX(' + (offset - 200) + 'px)';
      if (r2) r2.style.transform = 'translateX(' + (-(offset - 200)) + 'px)';
    }

    // Animated text
    const at = root.querySelector('[data-animtext]');
    if (at) {
      const rect = at.getBoundingClientRect();
      const total = 0.6 * vh + rect.height;
      let p = (0.8 * vh - rect.top) / total;
      p = Math.max(0, Math.min(1, p));
      const spans = at.querySelectorAll('[data-char]');
      const cf = p * spans.length;
      spans.forEach((s, i) => {
        const local = Math.max(0, Math.min(1, cf - i));
        s.style.opacity = (0.2 + 0.8 * local).toFixed(3);
      });
    }
  }

        desc: "A generative-AI virtual-character platform: 20M+ registered users, 100+ minutes of daily use, 65%+ retention. My job here was to answer its hardest question — where the money in AIGC comes from. The AI-video line I ran later became the direct basis for launching CastLoop.\n\nRetention was never this product's weak spot — monetization was. Subscriptions cap out low, and interruptive ads hurt immersion, which is this genre's lifeblood. Our answer was “generation as consumption” — making the act of AI generation itself the paid moment, where content is the product. I owned three parts of this line:\n\nInteractive paid-feature matrix — I planned and drove features like Inner Monologue (peeking into a character's private thoughts), AI-image tips, and AI video. The underlying bet: at moments of peak emotional intensity, users will pay to get “closer to the character.” Image-tipping turned the one-way gift of traditional tipping into “I spend gems, and AI generates a scene made just for me with this character” — after launch, tipping UV rose to 1,700+ and single-day gem spend broke 100k.\n\nAI video: the platform's next step grew out of this line — text and images have an emotional ceiling, and users want to see the character truly “move.” I connected the full pipeline from production to consumption; peak daily gem spend broke 330k, becoming the platform's first growth curve. But the real value wasn't the revenue — it proved users would keep paying for AI-generated video, and that proof became the company's direct basis for betting on AI interactive film-games and launching CastLoop. Proving out video consumption first is what made everything after it possible.\n\nAds × content — no hard ad slots; ads are embedded into story mechanics, e.g. a “locked door” beat mid-conversation where watching an ad continues the story. Ad revenue rose ~38% with no retention loss.\n\nModel side — I helped land our in-house LLM, running blind dialogue tests and fine-tuning of mainstream vs. in-house models with the algorithm team, focused on coherence, emotional stability, and character consistency; and built a reply-quality evaluation system, feeding user behavior data back into training.\n\nThis project clarified the dividing line of an AI product PM for me: the ceiling of the experience is set by the model, so a PM must be able to define “what a good reply is” and turn it into an evaluable, iterable metric system."

        desc: "An AI interactive film-game platform — a two-sided product with a consumer app and a creator studio (CastLoop Studio). I owned the platform's 0-to-1 product definition: the first spec came from me, and I left after the first version shipped; the platform later launched officially with 100+ original interactive works.\n\nCastLoop wasn't conceived out of thin air — its basis came from Saylo's AI video. That line grew into the first growth curve, proving users would keep paying for AI-generated video, so turning video from something you “watch” into an “interactive work” was the natural next step. But a single work can't sustain a content category — users burn through a batch of stories and hit a drought, and a handful of pro teams making things by hand can never keep pace. CastLoop's question was platform-level: how to turn interactive film-games from “projects” into “a content type that can be produced at scale, continuously.”\n\nOn the consumer side, I defined the full “watch-to-play” experience: users enter a story like a short drama, make choices at key nodes or freely type ideas, and AI generates new scenes and directions in real time; monetization follows content-platform logic — the full story opens for free, while premium options and chapters cost gems. Underneath is a standardized tree-shaped plot framework: branches open locally, the main line converges at key nodes, and AI fills content between nodes with logic validation — so “everyone's story is different” and “production cost stays controllable” hold at once. This framework absorbed the lessons the content team paid for on The Glass Lake (an interactive horror work launched on Saylo in 2026.3): early versions had branch explosions, ran over an hour, and couldn't be produced sustainably. My job was to productize those content-side lessons into standard platform capabilities.\n\nThe creator side, CastLoop Studio, is the platform's real ambition: from a one-line idea, a creator generates a complete project — script, characters, scenes, storyboards, plot tree, all the way to video; AI gives an editable first version and the human judges direction, tunes pacing, and converges it. The core proposition is redefining the creator's role: from “writing out every possibility” to “creative director.” This side directly determines whether platform supply can scale — and whether the next hit comes from an ordinary person with nothing but a story idea.\n\nAt the end of March 2026, I left after the first version shipped. The platform then launched publicly with 100+ original works; per official figures, the full AI creation system cut combined production-and-iteration cost by 70%+.\n\nThis project and Hugging are two eras of the same judgment: a platform's decisive battle is always on the supply side. In the Hugging era I solved the shortage of real human talent with guilds and a screening system; CastLoop solves content supply with an AI production pipeline — thickening the scale-supply end is a platform's true moat."

      + '<div style="display:flex; flex-direction:column; gap:clamp(8px,1.2vw,16px);">'
      + '<div style="color:#0C0C0C; opacity:0.45; font-weight:500; letter-spacing:0.04em; line-height:1.2; font-size:clamp(0.75rem,1.3vw,1rem);">' + esc(s.period) + '</div>'
      + '<div style="color:#0C0C0C; font-weight:500; line-height:1.05; font-size:clamp(1rem,2.2vw,2.1rem);">' + esc(s.name) + '</div>'
      + '<div style="color:#0C0C0C; opacity:0.6; font-weight:300; line-height:1.6; max-width:672px; font-size:clamp(0.85rem,1.6vw,1.25rem);">' + esc(s.desc) + '</div>'
      + '</div></div>'
    ).join('');

    const projects = v.projects.map(p => {
      const stats = p.stats.map(st =>
        '<div style="display:flex; flex-direction:column; gap:6px;">'
        + '<div style="color:#D7E2EA; font-weight:900; line-height:1; font-size:clamp(1.5rem,2.8vw,2.4rem);">' + esc(st.value) + '</div>'
        + '<div style="color:#D7E2EA; opacity:0.5; text-transform:uppercase; letter-spacing:0.1em; font-weight:300; font-size:clamp(0.6rem,0.85vw,0.78rem);">' + esc(st.label) + '</div>'
        + '</div>'
      ).join('');
      const tags = p.tags.map(tag =>
        '<span style="border:1px solid rgba(215,226,234,0.3); border-radius:999px; color:#D7E2EA; font-weight:300; text-transform:uppercase; letter-spacing:0.1em; padding:clamp(6px,0.6vw,10px) clamp(14px,1.4vw,22px); font-size:clamp(0.7rem,0.9vw,0.95rem);">' + esc(tag) + '</span>'
      ).join('');
      return '<div data-card-container style="position:sticky; top:24px; z-index:1; max-width:1080px; margin-left:auto; margin-right:auto; margin-bottom:clamp(40px,5vw,64px);">'
        + '<div data-card-inner data-scale="' + esc(p.scale) + '" style="transform-origin:center top; will-change:transform, opacity; border-radius:clamp(40px,5vw,60px); border:2px solid #D7E2EA; background:#0C0C0C; padding:clamp(16px,2.5vw,32px); display:flex; flex-direction:column; gap:clamp(16px,2vw,28px);">'
        + '<div style="position:relative; display:grid; grid-template-columns:1.05fr 0.95fr; min-height:clamp(380px,42vw,560px); border-radius:clamp(28px,3.5vw,44px); overflow:hidden; background:#141414;">'
        + '<div style="display:flex; flex-direction:column; justify-content:space-between; gap:clamp(28px,3.5vw,48px); padding:clamp(28px,3.5vw,56px); z-index:2;">'
        + '<div style="display:flex; flex-direction:column; gap:clamp(14px,1.6vw,22px);">'
        + '<div style="display:flex; align-items:center; gap:12px; color:#D7E2EA; text-transform:uppercase; letter-spacing:0.14em; font-weight:400; font-size:clamp(0.68rem,1vw,0.9rem);">'
        + '<span style="font-weight:900;">' + esc(p.num) + '</span>'
        + '<span style="opacity:0.55;">' + esc(p.cat) + '</span>'
        + '</div>'
        + '<div style="color:#D7E2EA; font-weight:900; text-transform:uppercase; line-height:0.92; letter-spacing:-0.02em; font-size:clamp(2.4rem,5.5vw,5rem);">' + esc(p.name) + '</div>'
        + '<p style="margin:0; color:#D7E2EA; opacity:0.82; font-weight:300; line-height:1.6; max-width:36ch; font-size:clamp(0.95rem,1.3vw,1.2rem);">' + esc(p.lead) + '</p>'
        + '</div>'
        + '<div style="display:flex; flex-wrap:wrap; gap:clamp(20px,3vw,48px);">' + stats + '</div>'
        + '</div>'
        + '<div style="position:relative; overflow:hidden;">'
        + '<img src="' + esc(p.img1) + '" loading="lazy" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:' + esc(p.imgPos) + ';">'
        + '<div style="position:absolute; inset:0; background:linear-gradient(90deg,rgba(20,20,20,0.85) 0%,rgba(20,20,20,0.18) 18%,rgba(20,20,20,0) 40%);"></div>'
        + '</div>'
        + '</div>'
        + '<div style="display:flex; flex-direction:column; gap:clamp(20px,2.5vw,32px); padding:clamp(4px,1vw,16px) clamp(8px,1.5vw,24px) clamp(4px,1vw,12px);">'
        + '<p style="margin:0; color:#D7E2EA; font-weight:300; line-height:1.85; font-size:clamp(1rem,1.3vw,1.2rem); white-space:pre-line; text-align:justify;">' + esc(p.body) + '</p>'
        + '<div style="display:flex; flex-wrap:wrap; gap:clamp(8px,0.8vw,12px);">' + tags + '</div>'
        + '</div>'
        + '</div></div>';
    }).join('');

    return ''
    + '<section style="position:relative; height:100vh; min-height:640px; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; padding-left:clamp(24px,4vw,40px); padding-right:clamp(24px,4vw,40px);">'
    +   '<nav data-fade style="opacity:0; transform:translate3d(0,-20px,0); transition:opacity 0.7s cubic-bezier(0.25,0.1,0.25,1) 0s, transform 0.7s cubic-bezier(0.25,0.1,0.25,1) 0s; display:flex; justify-content:space-between; align-items:center; padding-top:clamp(24px,3vw,32px); gap:12px; z-index:20;">'
    +     '<a class="nav-link" href="#about" style="' + navStyle + '">' + esc(t.navAbout) + '</a>'
    +     '<a class="nav-link" href="#experience" style="' + navStyle + '">' + esc(t.navExperience) + '</a>'
    +     '<a class="nav-link" href="#projects" style="' + navStyle + '">' + esc(t.navProjects) + '</a>'
    +     '<a class="nav-link" data-onclick="toggle" style="cursor:pointer; color:#D7E2EA; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; font-size:clamp(0.8rem,1.4vw,1.4rem); text-decoration:none; border:1px solid rgba(215,226,234,0.4); border-radius:999px; padding:4px 14px;">' + esc(v.langLabel) + '</a>'
    +   '</nav>'
    +   '<div style="overflow:hidden; width:100%; position:relative; z-index:5;">'
    +     '<h1 data-fade style="opacity:0; transform:translate3d(0,40px,0); transition:opacity 0.7s cubic-bezier(0.25,0.1,0.25,1) 0.15s, transform 0.7s cubic-bezier(0.25,0.1,0.25,1) 0.15s; margin:0; font-weight:900; text-transform:uppercase; letter-spacing:-0.03em; line-height:0.9; white-space:nowrap; width:100%; font-size:17vw; background:linear-gradient(180deg,#646973 0%,#BBCCD7 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;">' + esc(t.heroTitle) + '</h1>'
    +   '</div>'
    +   '<div style="display:flex; justify-content:flex-end; align-items:flex-end; padding-bottom:clamp(28px,4vw,40px); gap:24px; position:relative; z-index:20;">'
    +     '<div data-fade style="opacity:0; transform:translate3d(0,20px,0); transition:opacity 0.7s cubic-bezier(0.25,0.1,0.25,1) 0.5s, transform 0.7s cubic-bezier(0.25,0.1,0.25,1) 0.5s;">'
    +       contactBtn("letter-spacing:0.04em; white-space:nowrap; padding:clamp(12px,1vw,16px) clamp(28px,2.8vw,44px); font-size:clamp(0.78rem,1vw,1rem);")
    +     '</div>'
    +   '</div>'
    +   '<div style="position:absolute; left:50%; bottom:0; transform:translateX(-50%); z-index:10; width:clamp(280px,38vw,520px); pointer-events:none;">'
    +     '<div data-fade style="opacity:0; transform:translate3d(0,30px,0); transition:opacity 0.7s cubic-bezier(0.25,0.1,0.25,1) 0.6s, transform 0.7s cubic-bezier(0.25,0.1,0.25,1) 0.6s;">'
    +       '<div data-magnet>'
    +         '<img src="avatar-3d-v2.webp" alt="Miya" style="width:100%; display:block; filter:drop-shadow(0 30px 60px rgba(0,0,0,0.55));">'
    +       '</div>'
    +     '</div>'
    +   '</div>'
    + '</section>'
    + '<section data-marquee style="background:#0C0C0C; padding-top:clamp(96px,12vw,160px); padding-bottom:40px; overflow:hidden;">'
    +   '<div style="display:flex; flex-direction:column; gap:12px;">'
    +     '<div data-row="1" style="display:flex; gap:12px; will-change:transform;">' + marqueeImgs(v.row1) + '</div>'
    +     '<div data-row="2" style="display:flex; gap:12px; will-change:transform;">' + marqueeImgs(v.row2) + '</div>'
    +   '</div>'
    + '</section>'
    + '<section id="about" style="position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; padding-left:clamp(20px,4vw,40px); padding-right:clamp(20px,4vw,40px); padding-top:80px; padding-bottom:80px;">'
    +   '<img data-fade src="deco-moon.png" data-fallback="https://shrug-person-78902957.figma.site/_components/v2/ebb2b8f25d8e24d5f0a5ca8af4c950de81aa2fd7/moon_icon.11395d36.png" alt="" style="opacity:0; transform:translate3d(-80px,0,0); transition:opacity 0.9s cubic-bezier(0.25,0.1,0.25,1) 0.1s, transform 0.9s cubic-bezier(0.25,0.1,0.25,1) 0.1s; position:absolute; top:4%; left:4%; width:clamp(120px,15vw,210px); z-index:1;">'
    +   '<img data-fade src="deco-smiley.png" data-fallback="https://shrug-person-78902957.figma.site/_components/v2/ebb2b8f25d8e24d5f0a5ca8af4c950de81aa2fd7/p59_1.4659672e.png" alt="" style="opacity:0; transform:translate3d(-80px,0,0); transition:opacity 0.9s cubic-bezier(0.25,0.1,0.25,1) 0.25s, transform 0.9s cubic-bezier(0.25,0.1,0.25,1) 0.25s; position:absolute; bottom:8%; left:10%; width:clamp(100px,13vw,180px); z-index:1;">'
    +   '<img data-fade src="deco-lego.png" data-fallback="https://shrug-person-78902957.figma.site/_components/v2/ebb2b8f25d8e24d5f0a5ca8af4c950de81aa2fd7/lego_icon-1.703bb594.png" alt="" style="opacity:0; transform:translate3d(80px,0,0); transition:opacity 0.9s cubic-bezier(0.25,0.1,0.25,1) 0.15s, transform 0.9s cubic-bezier(0.25,0.1,0.25,1) 0.15s; position:absolute; top:4%; right:4%; width:clamp(120px,15vw,210px); z-index:1;">'
    +   '<img data-fade src="deco-cursor.png" data-fallback="https://shrug-person-78902957.figma.site/_components/v2/ebb2b8f25d8e24d5f0a5ca8af4c950de81aa2fd7/Group_134-1.2e04f3ce.png" alt="" style="opacity:0; transform:translate3d(80px,0,0); transition:opacity 0.9s cubic-bezier(0.25,0.1,0.25,1) 0.3s, transform 0.9s cubic-bezier(0.25,0.1,0.25,1) 0.3s; position:absolute; bottom:8%; right:10%; width:clamp(130px,16vw,220px); z-index:1;">'
    +   '<div style="position:relative; z-index:5; display:flex; flex-direction:column; align-items:center; gap:clamp(40px,6vw,64px);">'
    +     '<h2 data-fade style="opacity:0; transform:translate3d(0,40px,0); transition:opacity 0.7s cubic-bezier(0.25,0.1,0.25,1) 0s, transform 0.7s cubic-bezier(0.25,0.1,0.25,1) 0s; margin:0; text-align:center; font-weight:900; text-transform:uppercase; line-height:0.9; letter-spacing:-0.03em; font-size:clamp(3rem,12vw,160px); background:linear-gradient(180deg,#646973 0%,#BBCCD7 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;">' + esc(t.aboutHeading) + '</h2>'
    +     '<p data-animtext style="margin:0; color:#D7E2EA; font-weight:500; text-align:center; line-height:1.7; max-width:760px; font-size:clamp(0.95rem,1.6vw,1.2rem); white-space:pre-wrap;">' + charSpans + '</p>'
    +     '<p data-fade style="opacity:0; transform:translate3d(0,20px,0); transition:opacity 0.7s cubic-bezier(0.25,0.1,0.25,1) 0.2s, transform 0.7s cubic-bezier(0.25,0.1,0.25,1) 0.2s; margin:0; color:rgba(215,226,234,0.55); font-weight:300; text-align:center; line-height:1.7; max-width:620px; font-size:clamp(0.82rem,1.1vw,0.98rem);">' + esc(t.aboutSummary) + '</p>'
    +     '<div id="contact" data-fade style="opacity:0; transform:translate3d(0,30px,0); transition:opacity 0.7s cubic-bezier(0.25,0.1,0.25,1) 0s, transform 0.7s cubic-bezier(0.25,0.1,0.25,1) 0s; margin-top:clamp(16px,3vw,24px);">'
    +       contactBtn("text-transform:uppercase; letter-spacing:0.15em; white-space:nowrap; padding:clamp(12px,1vw,16px) clamp(32px,3vw,48px); font-size:clamp(0.75rem,1vw,1rem);")
    +     '</div>'
    +   '</div>'
    + '</section>'
    + '<section id="experience" style="background:#FFFFFF; border-top-left-radius:clamp(40px,5vw,60px); border-top-right-radius:clamp(40px,5vw,60px); padding-left:clamp(20px,4vw,40px); padding-right:clamp(20px,4vw,40px); padding-top:clamp(80px,10vw,128px); padding-bottom:clamp(80px,12vw,160px); position:relative; z-index:1;">'
    +   '<h2 style="margin:0 0 clamp(64px,9vw,112px) 0; text-align:center; color:#0C0C0C; font-weight:900; text-transform:uppercase; line-height:0.9; letter-spacing:-0.03em; font-size:clamp(3rem,12vw,160px);">' + esc(t.experienceHeading) + '</h2>'
    +   '<div style="max-width:1024px; margin:0 auto;">' + services + '<div style="border-top:1px solid rgba(12,12,12,0.15);"></div></div>'
    + '</section>'
    + '<section id="projects" style="background:#0C0C0C; border-top-left-radius:clamp(40px,5vw,60px); border-top-right-radius:clamp(40px,5vw,60px); margin-top:clamp(-56px,-6vw,-40px); position:relative; z-index:10; padding-left:clamp(20px,4vw,40px); padding-right:clamp(20px,4vw,40px); padding-top:clamp(64px,9vw,120px); padding-bottom:clamp(120px,16vw,220px);">'
    +   '<h2 style="margin:0 0 clamp(48px,7vw,96px) 0; text-align:center; font-weight:900; text-transform:uppercase; line-height:0.9; letter-spacing:-0.03em; font-size:clamp(3rem,12vw,160px); background:linear-gradient(180deg,#646973 0%,#BBCCD7 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;">' + esc(t.projectsHeading) + '</h2>'
    +   projects
    + '</section>';
  }

  render(initial) {
    const v = this.renderVals();
    this.root.innerHTML = this.template(v);
    this.root.querySelectorAll('img[data-fallback]').forEach((im) => im.addEventListener('error', () => { im.src = im.dataset.fallback; }, { once: true }));
    this.root.querySelectorAll('[data-onclick="contact"]').forEach((b) => b.addEventListener('click', () => this.handleContact()));
    this.root.querySelectorAll('[data-onclick="toggle"]').forEach((b) => b.addEventListener('click', () => this.toggleLang()));
    this.setupFade();
    if (!initial) {
      // On language toggle, keep content visible (no re-run of the entrance animation).
      this.root.querySelectorAll('[data-fade]').forEach((el) => {
        el.dataset.revealed = '1';
        el.style.transition = 'none';
        el.style.opacity = '1';
        el.style.transform = 'none';
      });
    }
    this.setupCards();
    this.setupMarqueeFit();
    this._update();
  }

  mount() {
    this.onScroll = this.onScroll.bind(this);
    this.onMouse = this.onMouse.bind(this);
    this.onResize = () => { this.setupCards(); this.onScroll(); };
    this.render(true);
    window.addEventListener('scroll', this.onScroll, { passive: true });
    window.addEventListener('resize', this.onResize);
    window.addEventListener('mousemove', this.onMouse);
    requestAnimationFrame(() => this.onScroll());
    [120, 400, 900].forEach((ms) => setTimeout(() => { this.setupCards(); this.onScroll(); }, ms));
  }
}
new App().mount();
</script>
</body>
</html>
